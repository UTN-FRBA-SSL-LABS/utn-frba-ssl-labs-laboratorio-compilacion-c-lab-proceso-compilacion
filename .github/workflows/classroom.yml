name: Autograding

on:
  push:
    branches: [ "**" ]
    paths:
      - "*.i"
      - "*.s"
      - "*.c"
      - "salidas/**"
      - "README.md"

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar GCC
        run: sudo apt-get install -y gcc

      # ── Archivos generados ─────────────────────────────────────

      - name: "1. programa.i existe"
        id: t1
        continue-on-error: true
        run: test -f programa.i

      - name: "2. No hay #define en programa.i (macros expandidas)"
        id: t2
        continue-on-error: true
        run: test -f programa.i && ! grep -q '^#define' programa.i

      - name: "3. VERSION expandido a '1.0' en programa.i"
        id: t3
        continue-on-error: true
        run: grep -q '"1\.0"' programa.i

      - name: "4. CUADRADO(LIMITE) expandido a ((5) * (5)) en programa.i"
        id: t4
        continue-on-error: true
        run: grep -qF '((5) * (5))' programa.i

      - name: "5. Comentarios eliminados de programa.i"
        id: t5
        continue-on-error: true
        run: "! grep -q 'Archivo fuente principal' programa.i"

      - name: "6. programa.i incluye headers completos (>500 lineas)"
        id: t6
        continue-on-error: true
        run: test $(wc -l < programa.i) -gt 500

      - name: "7. programa.s existe"
        id: t7
        continue-on-error: true
        run: test -f programa.s

      - name: "8. sumar definida en programa.s"
        id: t8
        continue-on-error: true
        run: grep -qE '^(sumar|_sumar):' programa.s

      - name: "9. area_circulo llamada pero no definida en programa.s"
        id: t9
        continue-on-error: true
        run: grep -q 'area_circulo' programa.s && ! grep -qE '^(area_circulo|_area_circulo):' programa.s

      - name: "10. nm_programa_o.txt tiene area_circulo como U (indefinido)"
        id: t10
        continue-on-error: true
        run: test -f salidas/nm_programa_o.txt && grep -qE 'U.*(area_circulo|_area_circulo)' salidas/nm_programa_o.txt

      - name: "11. nm_ejecutable.txt tiene area_circulo como T (resuelto)"
        id: t11
        continue-on-error: true
        run: test -f salidas/nm_ejecutable.txt && grep -qE 'T.*(area_circulo|_area_circulo)' salidas/nm_ejecutable.txt

      - name: "12. salida_debug.txt contiene [DEBUG]"
        id: t12
        continue-on-error: true
        run: test -f salidas/salida_debug.txt && grep -q '\[DEBUG\]' salidas/salida_debug.txt

      - name: "13. Los fuentes compilan y producen factorial(5)=120"
        id: t13
        continue-on-error: true
        run: gcc -Wall programa.c matematica.c -o programa_ci && ./programa_ci | grep -q '120'

      - name: "14. programa.o NO esta commiteado"
        id: t14
        continue-on-error: true
        run: "! test -f programa.o"

      # ── Respuestas cerradas de README.md ──────────

      - name: "R1. Respuesta: LINEAS_I es un numero de 3 o 4 digitos"
        id: r1
        continue-on-error: true
        run: grep -qE '^LINEAS_I=[0-9]{3,4}$' README.md

      - name: "R2. Respuesta: CUADRADO_EN_I=NO"
        id: r2
        continue-on-error: true
        run: grep -qiE '^CUADRADO_EN_I=NO$' README.md

      - name: "R3. Respuesta: NOMBRE_MACRO_VERSION=VERSION"
        id: r3
        continue-on-error: true
        run: grep -qE '^NOMBRE_MACRO_VERSION=VERSION$' README.md

      - name: "R4. Respuesta: COMENTARIOS_EN_I=NO"
        id: r4
        continue-on-error: true
        run: grep -qiE '^COMENTARIOS_EN_I=NO$' README.md

      - name: "R5. Respuesta: DEBUG_ACTIVA_CODIGO=SI"
        id: r5
        continue-on-error: true
        run: grep -qiE '^DEBUG_ACTIVA_CODIGO=SI$' README.md

      - name: "R6. Respuesta: AREA_EN_S=LLAMADA"
        id: r6
        continue-on-error: true
        run: grep -qiE '^AREA_EN_S=LLAMADA$' README.md

      - name: "R7. Respuesta: LLAMADAS_EN_S=SI"
        id: r7
        continue-on-error: true
        run: grep -qiE '^LLAMADAS_EN_S=SI$' README.md

      - name: "R8. Respuesta: TIPO_AREA_EN_O=U"
        id: r8
        continue-on-error: true
        run: grep -qE '^TIPO_AREA_EN_O=U$' README.md

      - name: "R9. Respuesta: ETAPA_QUE_RESUELVE=ENLAZADO"
        id: r9
        continue-on-error: true
        run: grep -qiE '^ETAPA_QUE_RESUELVE=ENLAZADO$' README.md

      - name: "R10. Respuesta: EJECUTABLE_O=NO"
        id: r10
        continue-on-error: true
        run: grep -qiE '^EJECUTABLE_O=NO$' README.md

      - name: "R11. Respuesta: TIPO_AREA_ENLAZADO=T"
        id: r11
        continue-on-error: true
        run: grep -qE '^TIPO_AREA_ENLAZADO=T$' README.md

      - name: "R12. Respuesta: SIMBOLOS_U_FINAL=SI"
        id: r12
        continue-on-error: true
        run: grep -qiE '^SIMBOLOS_U_FINAL=SI$' README.md

      - name: "R13. Respuesta: FACTORIAL_5=120"
        id: r13
        continue-on-error: true
        run: grep -qE '^FACTORIAL_5=120$' README.md

      # ── Puntaje final ──────────────────────────────────────────
      - name: Calcular puntaje
        if: always()
        env:
          O_T1:  ${{ steps.t1.outcome }}
          O_T2:  ${{ steps.t2.outcome }}
          O_T3:  ${{ steps.t3.outcome }}
          O_T4:  ${{ steps.t4.outcome }}
          O_T5:  ${{ steps.t5.outcome }}
          O_T6:  ${{ steps.t6.outcome }}
          O_T7:  ${{ steps.t7.outcome }}
          O_T8:  ${{ steps.t8.outcome }}
          O_T9:  ${{ steps.t9.outcome }}
          O_T10: ${{ steps.t10.outcome }}
          O_T11: ${{ steps.t11.outcome }}
          O_T12: ${{ steps.t12.outcome }}
          O_T13: ${{ steps.t13.outcome }}
          O_T14: ${{ steps.t14.outcome }}
          O_R1:  ${{ steps.r1.outcome }}
          O_R2:  ${{ steps.r2.outcome }}
          O_R3:  ${{ steps.r3.outcome }}
          O_R4:  ${{ steps.r4.outcome }}
          O_R5:  ${{ steps.r5.outcome }}
          O_R6:  ${{ steps.r6.outcome }}
          O_R7:  ${{ steps.r7.outcome }}
          O_R8:  ${{ steps.r8.outcome }}
          O_R9:  ${{ steps.r9.outcome }}
          O_R10: ${{ steps.r10.outcome }}
          O_R11: ${{ steps.r11.outcome }}
          O_R12: ${{ steps.r12.outcome }}
          O_R13: ${{ steps.r13.outcome }}
        run: |
          pts() { [ "$1" = "success" ] && echo "$2" || echo 0; }
          row() { [ "$2" = "success" ] && echo "| $1 | ✅ | $3 / $3 |" || echo "| $1 | ❌ | 0 / $3 |"; }

          SCORE=0
          SCORE=$((SCORE + $(pts "$O_T1"  2)))
          SCORE=$((SCORE + $(pts "$O_T2"  3)))
          SCORE=$((SCORE + $(pts "$O_T3"  3)))
          SCORE=$((SCORE + $(pts "$O_T4"  3)))
          SCORE=$((SCORE + $(pts "$O_T5"  2)))
          SCORE=$((SCORE + $(pts "$O_T6"  2)))
          SCORE=$((SCORE + $(pts "$O_T7"  2)))
          SCORE=$((SCORE + $(pts "$O_T8"  3)))
          SCORE=$((SCORE + $(pts "$O_T9"  4)))
          SCORE=$((SCORE + $(pts "$O_T10" 4)))
          SCORE=$((SCORE + $(pts "$O_T11" 4)))
          SCORE=$((SCORE + $(pts "$O_T12" 3)))
          SCORE=$((SCORE + $(pts "$O_T13" 5)))
          SCORE=$((SCORE + $(pts "$O_T14" 2)))
          SCORE=$((SCORE + $(pts "$O_R1"  4)))
          SCORE=$((SCORE + $(pts "$O_R2"  4)))
          SCORE=$((SCORE + $(pts "$O_R3"  4)))
          SCORE=$((SCORE + $(pts "$O_R4"  4)))
          SCORE=$((SCORE + $(pts "$O_R5"  5)))
          SCORE=$((SCORE + $(pts "$O_R6"  5)))
          SCORE=$((SCORE + $(pts "$O_R7"  4)))
          SCORE=$((SCORE + $(pts "$O_R8"  5)))
          SCORE=$((SCORE + $(pts "$O_R9"  4)))
          SCORE=$((SCORE + $(pts "$O_R10" 4)))
          SCORE=$((SCORE + $(pts "$O_R11" 4)))
          SCORE=$((SCORE + $(pts "$O_R12" 5)))
          SCORE=$((SCORE + $(pts "$O_R13" 6)))

          {
            echo "## Puntaje: $SCORE / 100"
            echo ""
            echo "| Test | Resultado | Puntos |"
            echo "|------|:---------:|-------:|"
            row "1. programa.i existe"                          "$O_T1"  2
            row "2. No hay #define en programa.i"               "$O_T2"  3
            row "3. VERSION expandido a '1.0'"                  "$O_T3"  3
            row "4. CUADRADO(LIMITE) expandido"                 "$O_T4"  3
            row "5. Comentarios eliminados"                     "$O_T5"  2
            row "6. Headers completos (>500 líneas)"            "$O_T6"  2
            row "7. programa.s existe"                          "$O_T7"  2
            row "8. sumar definida en programa.s"               "$O_T8"  3
            row "9. area_circulo no definida en .s"             "$O_T9"  4
            row "10. area_circulo U en nm_programa_o.txt"       "$O_T10" 4
            row "11. area_circulo T en nm_ejecutable.txt"       "$O_T11" 4
            row "12. [DEBUG] en salida_debug.txt"               "$O_T12" 3
            row "13. Compila y factorial(5)=120"                "$O_T13" 5
            row "14. programa.o no commiteado"                  "$O_T14" 2
            row "R1. LINEAS_I (3-4 dígitos)"                   "$O_R1"  4
            row "R2. CUADRADO_EN_I=NO"                         "$O_R2"  4
            row "R3. NOMBRE_MACRO_VERSION=VERSION"              "$O_R3"  4
            row "R4. COMENTARIOS_EN_I=NO"                      "$O_R4"  4
            row "R5. DEBUG_ACTIVA_CODIGO=SI"                   "$O_R5"  5
            row "R6. AREA_EN_S=LLAMADA"                        "$O_R6"  5
            row "R7. LLAMADAS_EN_S=SI"                         "$O_R7"  4
            row "R8. TIPO_AREA_EN_O=U"                         "$O_R8"  5
            row "R9. ETAPA_QUE_RESUELVE=ENLAZADO"              "$O_R9"  4
            row "R10. EJECUTABLE_O=NO"                         "$O_R10" 4
            row "R11. TIPO_AREA_ENLAZADO=T"                    "$O_R11" 4
            row "R12. SIMBOLOS_U_FINAL=SI"                     "$O_R12" 5
            row "R13. FACTORIAL_5=120"                         "$O_R13" 6
          } >> "$GITHUB_STEP_SUMMARY"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Puntaje: $SCORE / 100"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$SCORE" -eq 100 ]; then
            echo ""
            echo "🎉 ¡Felicitaciones! Obtuviste 100/100. Laboratorio completado."
          elif [ "$SCORE" -ge 60 ]; then
            echo ""
            echo "✅ ¡Aprobado! Obtuviste $SCORE/100."
            echo "   Revisá los tests con ❌ en el resumen si querés mejorar tu puntaje."
          else
            echo ""
            echo "❌ Puntaje insuficiente: $SCORE/100 (mínimo 60)."
            echo "   Revisá los tests que no pasaron en el resumen de arriba,"
            echo "   corregí los errores y volvé a hacer push."
            exit 1
          fi

      # ── Reporte a GitHub Classroom ─────────────────────────────
      - name: Resultado autograding
        if: always()
        uses: education/autograding@v1
        continue-on-error: true
